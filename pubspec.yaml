name: verificador_billetes_bo
description: "Escáner para detectar billetes inhabilitados en Bolivia."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  camera: ^0.12.0
  google_mlkit_text_recognition: ^0.15.1
  font_awesome_flutter: ^10.12.0
  shared_preferences: ^2.5.4



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4+3
  flutter_launcher_icons: ^0.14.4


flutter:

  uses-material-design: true

  assets:
    - assets/images/background.png


# Configuración del icono (al final del archivo, sin sangría)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
  # Para Android 8.0+ (Iconos adaptativos)
  adaptive_icon_background: "#FFFFFF" # O una imagen de fondo
  adaptive_icon_foreground: "assets/icon.png"

